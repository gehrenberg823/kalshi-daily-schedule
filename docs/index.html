)", "league": "Mexico LMB", "date": "Jul 24", "start_time": "8:30 PM CT", "sort_key": 1784943000.0, "event_ticker": "KXLMBGAME-26JUL242130ADMCDJ", "event_url": "https://kalshi.com/markets/kx/m/kxlmbgame-26jul242130admcdj", "thunderpick_url": ""}, {"num": 365, "event": "Tijuana de Caliente vs Leon", "sub_title": "TIJ vs LEO (Jul 24)", "league": "Liga MX", "date": "Jul 24", "start_time": "9:00 PM CT", "sort_key": 1784944800.0, "event_ticker": "KXLIGAMXGAME-26JUL24TIJLEO", "event_url": "https://kalshi.com/markets/kx/m/kxligamxgame-26jul24tijleo", "thunderpick_url": ""}, {"num": 366, "event": "Atlante vs America", "sub_title": "ALA vs AME (Jul 24)", "league": "Liga MX", "date": "Jul 24", "start_time": "9:00 PM CT", "sort_key": 1784944800.0, "event_ticker": "KXLIGAMXGAME-26JUL24ALAAME", "event_url": "https://kalshi.com/markets/kx/m/kxligamxgame-26jul24alaame", "thunderpick_url": ""}, {"num": 367, "event": "Gold Coast Suns vs Carlton Blues", "sub_title": "GCS vs CFC (Jul 24)", "league": "AFL", "date": "Jul 24", "start_time": "10:05 PM CT", "sort_key": 1784948700.0, "event_ticker": "KXAFLGAME-26JUL242305GCSCFC", "event_url": "https://kalshi.com/markets/kx/m/kxaflgame-26jul242305gcscfc", "thunderpick_url": ""}], "leagues": ["AFL", "APF Division de Honor", "Allsvenskan", "Argentina Primera Division", "Bolivia Premier Division", "Brasileiro Serie A", "Brasileiro Serie B", "CFL", "CS2", "Canadian Premier League", "Chile Liga de Primera", "Colombian Liga DIMAYOR", "Dota 2", "Ecuador LigaPro", "Eliteserien", "Inter-Provincial Cup", "Japan NPB", "Korea K League 1", "Korea KBO", "Lanka Premier League", "Liga MX", "LoL", "MLB", "Mexico LMB", "National Rugby League", "New Zealand NBL", "ODI (M)", "One-Day Cup", "Peru Liga 1", "R6", "Soccer (MLS)", "Super League Rugby", "T20 (M)", "T20 International (M)", "The Hundred (M)", "The Hundred (W)", "Titled Tuesday", "USL Championship", "Uruguay Primera Division", "Valorant", "Vietnam VBA", "WNBA"], "dates": [{"key": "Jul 21", "label": "Tue Jul 21"}, {"key": "Jul 22", "label": "Wed Jul 22"}, {"key": "Jul 23", "label": "Thu Jul 23"}, {"key": "Jul 24", "label": "Fri Jul 24"}]};
const nowSec = () => Date.now() / 1000;
const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

document.getElementById("meta").textContent =
  `Generated: ${DATA.generated_at} · ${DATA.rows.length} events`;

let table;
let activeDate = DATA.dates[0].key;
let activeLeagues = new Set();   // empty = All
let autoScrolled = false;

function applyFilters() {
  table.column(3).search("^" + esc(activeDate) + "$", true, false);
  const lg = activeLeagues.size
    ? "^(" + [...activeLeagues].map(esc).join("|") + ")$" : "";
  table.column(2).search(lg, true, false);
  table.draw();
  renderLeagueChips();
}

// --- Date filter ---
const dateBar = document.getElementById("date-filters");
const dateLbl = document.createElement("span");
dateLbl.className = "filter-label";
dateLbl.textContent = "Date";
dateBar.appendChild(dateLbl);

const DATE_COUNTS = DATA.rows.reduce((acc, r) => {
  acc[r.date] = (acc[r.date] || 0) + 1;
  return acc;
}, {});

DATA.dates.forEach(d => {
  const b = document.createElement("button");
  b.innerHTML = `${d.label} <span class="count">${DATE_COUNTS[d.key] || 0}</span>`;
  b.dataset.date = d.key;
  if (d.key === activeDate) b.classList.add("active");
  b.addEventListener("click", () => {
    document.querySelectorAll("#date-filters button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    activeDate = d.key;
    applyFilters();
  });
  dateBar.appendChild(b);
});

// --- League filter: multi-select chips, ordered by event count on the active
// date; leagues with nothing on that date don't render a chip at all. ---
function renderLeagueChips() {
  const bar = document.getElementById("league-filters");
  bar.innerHTML = "";
  const lbl = document.createElement("span");
  lbl.className = "filter-label";
  lbl.textContent = "League";
  bar.appendChild(lbl);

  const counts = {};
  let total = 0;
  DATA.rows.forEach(r => {
    if (r.date !== activeDate) return;
    counts[r.league] = (counts[r.league] || 0) + 1;
    total++;
  });

  const mk = (label, count, on, click) => {
    const b = document.createElement("button");
    b.innerHTML = `${label} <span class="count">${count}</span>`;
    if (on) b.classList.add("active");
    b.addEventListener("click", click);
    bar.appendChild(b);
  };

  mk("All", total, activeLeagues.size === 0, () => { activeLeagues.clear(); applyFilters(); });

  DATA.leagues
    .filter(lg => counts[lg])
    .sort((a, b) => counts[b] - counts[a] || a.localeCompare(b))
    .forEach(lg => mk(lg, counts[lg], activeLeagues.has(lg), () => {
      activeLeagues.has(lg) ? activeLeagues.delete(lg) : activeLeagues.add(lg);
      applyFilters();
    }));
}

// --- "now" awareness + hour structure: dim rows that already started, break
// the list with a light divider whenever the hour changes, and (when the
// visible list is time-sorted and spans the current moment) a NOW divider.
const hourLbl = k => new Date(k * 1000).toLocaleTimeString("en-US",
  { hour: "numeric", timeZone: "America/Chicago" });
function markNow(api) {
  document.querySelectorAll("tr.now-divider, tr.hr-divider").forEach(el => el.remove());
  const ord = api.order();
  const timeAsc = ord.length && ord[0][0] === 4 && ord[0][1] === "asc";
  const now = nowSec();
  let past = 0, firstFuture = null, prevHour = null;
  api.rows({ search: "applied", order: "applied" }).every(function () {
    const d = this.data(), tr = this.node();
    const isPast = d.sort_key && d.sort_key < now;
    tr.classList.toggle("past", !!isPast);
    if (isPast) past++;
    else if (!firstFuture) firstFuture = tr;
    // hour dividers (skip TBD rows, whose sort_key is a far-future sentinel)
    if (timeAsc && d.sort_key && d.sort_key < 4e9) {
      const h = hourLbl(d.sort_key);
      if (prevHour !== null && h !== prevHour) {
        const div = document.createElement("tr");
        div.className = "hr-divider";
        div.innerHTML = `<td colspan="5">${h}</td>`;
        tr.parentNode.insertBefore(div, tr);
      }
      prevHour = h;
    }
  });
  if (timeAsc && past > 0 && firstFuture) {
    const tr = document.createElement("tr");
    tr.className = "now-divider";
    const lbl = new Date().toLocaleTimeString("en-US",
      { hour: "numeric", minute: "2-digit", timeZone: "America/Chicago" });
    tr.innerHTML = `<td colspan="5">now · ${lbl} CT</td>`;
    firstFuture.parentNode.insertBefore(tr, firstFuture);
    if (!autoScrolled) {
      autoScrolled = true;
      setTimeout(() => tr.scrollIntoView({ block: "center" }), 0);
    }
  }
}

table = new DataTable("#tbl", {
  data: DATA.rows,
  paging: false,
  order: [[4, "asc"]],
  drawCallback: function () { markNow(this.api()); },
  columns: [
    { data: null, className: "num", width: "40px", orderable: false, searchable: false,
      render: (d, t, row, meta) => meta.row + 1 },
    { data: "event",
      render: (d, t, row) => {
        if (t !== "display") return d;
        if (row.sub_title && row.sub_title !== d) return `${d} <span style="color:#888;font-size:12px">${row.sub_title}</span>`;
        return d;
      }
    },
    { data: "league" },
    { data: "date", visible: false },
    { data: "start_time", className: "time",
      render: (d, t, row) => {
        if (t === "sort" || t === "type") return row.sort_key;
        if (d === "TBD") return `<span class="tbd">TBD</span>`;
        if (t !== "display") return d;
        const dt = row.sort_key - nowSec();
        if (dt > 0 && dt < 6 * 3600) {
          const m = Math.round(dt / 60);
          const rel = m < 60 ? `in ${m}m` : `in ${Math.floor(m / 60)}h ${m % 60}m`;
          return `${d} <span class="rel">${rel}</span>`;
        }
        return d;
      }
    },
    { data: "event_ticker", className: "ticker",
      render: (d, t, row) => {
        if (t === "sort" || t === "type" || t === "filter") return d || "";
        if (!d) return "";
        return `<a href="${row.event_url}" target="_blank" rel="noopener">${d}</a>`;
      }
    },
  ],
});

// Apply initial filters (also builds the league chips)
applyFilters();

// Keep the dimming, divider position, and "in Xm" labels current
setInterval(() => table.draw(false), 60000);
</script>
